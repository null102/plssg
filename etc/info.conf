# plssg global site info
# Per-site overrides go in src/<site>/assets/info.conf

[site]
title            = My Site
tagline          = Hello, world.
favicon          = /assets/favicon.ico
logo             = /assets/logo.svg
logo_size        = 4em

# Visual config (colors / fonts / sizes / layout) lives in etc/themes.conf.

[footer]
left   = <a href="/">Powered by plssg</a>
center = &copy; 2026 Anonymous
right  = <a href="/rss.xml">RSS</a>

[rss]
title       = My Site
description = My Site
link        = /rss.xml
