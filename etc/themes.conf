# plssg theme configuration.
#
# [global] applies to every site (including the root pseudo-site).
# [<site_id>] overrides for one sub-site (site_id = directory name with NN_ stripped,
# e.g. 'Example' for src/01_Example/).
#
# Any key here becomes a CSS variable on :root.
# Naming: INI key 'color_text' → CSS '--color-text'.
# Override only what you want; anything omitted inherits DEFAULT_CSS in bin/layout.py.
#
# Recognized knobs (uncomment / edit to override):
#   colors:        color_text, color_bg, color_border, color_hover_bg, color_code_bg
#   font families: font_family_body, font_family_mono
#   font sizes:    font_body, font_nav, font_banner, font_sidebar,
#                  font_h1, font_h2, font_h3, font_pre, font_code, font_footer
#   layout:        sidebar_width, content_max_width
#
# Sub-site sections are auto-appended on `python3 bin/main.py` — leave them empty
# to inherit [global], or fill in any of the keys above to override per-site.

[global]
# colors
color_text       = #000
color_bg         = #fff
color_border     = #000
color_hover_bg   = #eee
color_code_bg    = #f5f5f5

# font families
font_family_body = Helvetica, Verdana, Arial, 'Liberation Sans', FreeSans, sans-serif
font_family_mono = Menlo, Consolas, 'Liberation Mono', monospace

# font sizes
font_body    = 84%
font_nav     = 1.5em
font_banner  = 1.9em
font_sidebar = 120%
font_h1      = 145.5%
font_h2      = 115.5%
font_h3      = 105%
font_pre     = 1.05em
font_code    = 0.95em
font_footer  = 0.95em

# layout
sidebar_width     = 16em
content_max_width = 70em

# auto-generated for sub-site; override any [global] key here
[Example]
